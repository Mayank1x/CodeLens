name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    # Provide a real PostgreSQL for integration tests that need it
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: codelens
          POSTGRES_PASSWORD: codelens
          POSTGRES_DB: codelens_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U codelens -d codelens_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://codelens:codelens@localhost:5432/codelens
      JWT_SECRET: ci-test-secret-do-not-use-in-production
      SKIP_AUTH: "true"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      working-directory: ./backend
      run: |
        pytest tests/ -v
